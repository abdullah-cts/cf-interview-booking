<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clear Bookings</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f5f3ef; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border-radius: 16px; padding: 36px; width: 100%; max-width: 380px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    h1 { font-size: 20px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
    p { font-size: 14px; color: #888; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    input[type=password] { width: 100%; padding: 11px 13px; border: 1.5px solid #e0ddd8; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; margin-bottom: 16px; transition: border 0.15s; }
    input[type=password]:focus { border-color: #e53e3e; }
    button { width: 100%; padding: 13px; border-radius: 10px; border: none; background: #e53e3e; color: #fff; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background 0.15s; }
    button:hover:not(:disabled) { background: #c53030; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .status { margin-top: 14px; padding: 12px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; display: none; }
    .status.success { background: #e8f5e9; border: 1px solid #a5d6a7; color: #2e7d32; }
    .status.error { background: #fdecea; border: 1px solid #f5c6cb; color: #c62828; }
    .back { display: block; text-align: center; margin-top: 18px; font-size: 13px; color: #888; text-decoration: none; }
    .back:hover { color: #1a1a2e; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Clear All Bookings</h1>
    <p>This will permanently delete all interview bookings. Enter the admin password to continue.</p>
    <label for="pwd">Password</label>
    <input type="password" id="pwd" placeholder="Enter admin password" />
    <button id="btn" onclick="doDelete()">Clear All Bookings</button>
    <div id="status" class="status"></div>
    <a href="/" class="back">← Back to booking page</a>
  </div>
  <script>
    async function doDelete() {
      const password = document.getElementById("pwd").value;
      if (!password) return;
      const btn = document.getElementById("btn");
      btn.disabled = true;
      btn.textContent = "Clearing…";
      try {
        const res = await fetch("/api/bookings", {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
        });
        const data = await res.json();
        const el = document.getElementById("status");
        el.style.display = "block";
        if (res.ok) {
          el.className = "status success";
          el.textContent = "✅ All bookings have been cleared.";
          document.getElementById("pwd").value = "";
        } else {
          el.className = "status error";
          el.textContent = `⚠️ ${data.error || "Something went wrong."}`;
        }
      } catch {
        const el = document.getElementById("status");
        el.style.display = "block";
        el.className = "status error";
        el.textContent = "⚠️ Network error. Please try again.";
      }
      btn.disabled = false;
      btn.textContent = "Clear All Bookings";
    }

    document.getElementById("pwd").addEventListener("keydown", e => {
      if (e.key === "Enter") doDelete();
    });
  </script>
</body>
</html>
